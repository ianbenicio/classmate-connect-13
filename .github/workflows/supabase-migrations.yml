name: Supabase migrations

# Aplica novas migrations em supabase/migrations/ ao fazer push em main.
#
# Pré-requisitos (uma única vez, configurar em Settings → Secrets and variables
# → Actions):
#   - SUPABASE_ACCESS_TOKEN  (gerado em https://app.supabase.com/account/tokens)
#   - SUPABASE_PROJECT_REF   (ref do projeto, ex.: pbzkbwkzexhtdfuyaqiv)
#   - SUPABASE_DB_PASSWORD   (senha do Postgres do projeto)
#
# Comportamento:
#   - Roda apenas quando há mudanças em supabase/migrations/ ou neste workflow.
#   - Faz `supabase link` + `supabase db push` (idempotente — só aplica
#     migrations não-aplicadas).
#   - Falha o build se algo der errado, evitando código fora-de-sync com schema.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch: {} # permite rodar manualmente

jobs:
  push:
    name: db push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Faltam secrets: SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF e SUPABASE_DB_PASSWORD precisam estar configurados."
            exit 1
          fi

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"
